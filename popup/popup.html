<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlockTab</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">🛡️</span>
        <h1>BlockTab</h1>
      </div>
      <button id="settingsBtn" class="icon-btn" title="Dashboard">⚙️</button>
    </header>

    <!-- Today's Summary -->
    <section class="summary-card">
      <div class="summary-label">Today's Screen Time</div>
      <div id="totalTime" class="summary-time">0s</div>
      <div class="summary-bar-track">
        <div id="summaryBar" class="summary-bar-fill" style="width: 0%"></div>
      </div>
    </section>

    <!-- Top Sites -->
    <section class="sites-section">
      <h2 class="section-title">Top Sites</h2>
      <ul id="siteList" class="site-list">
        <li class="site-empty">No usage tracked yet today</li>
      </ul>
    </section>

    <!-- Actions -->
    <section class="actions">
      <button id="focusBtn" class="action-btn focus-btn">
        <span class="action-icon">🔒</span>
        <span id="focusLabel">Focus Mode</span>
      </button>
      <button id="strictBtn" class="action-btn strict-btn">
        <span class="action-icon">⚡</span>
        <span>Strict Mode</span>
      </button>
    </section>

    <!-- Focus Mode Panel (hidden by default) -->
    <section id="focusPanel" class="focus-panel hidden">
      <h3>Start Focus Session</h3>
      <div class="focus-options">
        <button class="focus-duration" data-minutes="25">25 min</button>
        <button class="focus-duration" data-minutes="50">50 min</button>
        <button class="focus-duration" data-minutes="90">90 min</button>
        <button class="focus-duration" data-minutes="120">2 hr</button>
      </div>
      <button id="cancelFocus" class="cancel-btn hidden">Cancel Focus</button>
    </section>

    <!-- Strict Mode Panel (hidden by default) -->
    <section id="strictPanel" class="strict-panel hidden">
      <h3>Start Strict Session</h3>
      <p class="panel-desc">Blocks ALL sites except whitelisted ones. Cannot be cancelled early.</p>
      <div class="focus-options">
        <button class="strict-duration" data-minutes="30">30 min</button>
        <button class="strict-duration" data-minutes="60">1 hr</button>
        <button class="strict-duration" data-minutes="120">2 hr</button>
      </div>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
